        .container {

            color: #00ffff;

        .panels {

            gap: 20px;
            flex: 1;
            align-items: center;
            justify-content: center;

        .panel {
            background: rgba(0,0,0,0.8);
            border: 3px solid;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            min-width: 200px;
            box-shadow: 0 0 30px rgba(255,0,255,0.5);

        .panel1 { border-color: #ff1493; }
        .panel2 { border-color: #00ffff; }
        .panel-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 10px currentColor;

        .counter {
            font-family: 'Digital-7', 'Courier New', monospace;
            font-size: 80px;
            font-weight: bold;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 20px currentColor;
            transition: all 0.3s ease;
        }
        .panel1 .counter { color: #ff1493; }
        .panel2 .counter { color: #00ffff; }
        .spin-btn {
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            border: none;
            color: black;
            font-weight: bold;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(255,0,255,0.5);
            transition: all 0.3s;
        }
        .spin-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0,255,255,0.8); }
        .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .neon-blink {
            animation: neonBlink 0.5s infinite alternate;
        }
        @keyframes neonBlink {
            0% { text-shadow: 0 0 20px currentColor; }
            100% { text-shadow: 0 0 40px currentColor, 0 0 60px currentColor; }
        }
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .popup.active { display: flex; }
        .popup-title {
            font-size: 48px;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 0 30px #ff00ff;
            animation: glow 1s infinite alternate;
        }
        .view-btn {
            background: linear-gradient(45deg, #ff1493, #ff00ff);
            border: none;
            color: white;
            font-size: 24px;
            padding: 20px 40px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255,20,147,0.8);
            transition: all 0.3s;
        }
        .view-btn:hover { transform: scale(1.1); box-shadow: 0 0 50px rgba(255,0,255,1); }
    </style>
</head>
