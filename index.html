function spin(panel) {
    const counter = document.getElementById('counter' + panel);
    const btn = document.getElementById('btn' + panel);
    btn.disabled = true;
    btn.textContent = '⏳ EN COURS…';

    const maxNum = panel === 1 ? 16 : 80;
    let i = 0;
    counter.classList.add('rolling');

    const interval = setInterval(() => {
        i = (i % maxNum) + 1;
        counter.textContent = i.toString().padStart(2, '0');
    }, 60);

    const duration = 2000 + Math.random() * 1500;
    setTimeout(() => {
        clearInterval(interval);
        counter.classList.remove('rolling');
        counter.classList.add('final');

        const finalNum = i.toString().padStart(2, '0');
        counter.textContent = finalNum;

        const positions = panel === 1 ? positionsAvecBouche : positionsSansBouche;
        const pos = positions[finalNum];

            btn.disabled = false;
            btn.textContent = '▶ LANCER';

        }, 1600);
    }, duration);
}

            document.getElementById('popup1').classList.remove('active');
            document.getElementById('popup2').classList.add('active');
        }
    }, 1000);
}
